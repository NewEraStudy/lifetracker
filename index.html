function getWeekNum(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const diff = Math.floor((d - PLAN_START) / 86400000);
  if (diff < 0 || diff > 91) return null;
  return Math.min(Math.floor(diff / 7) + 1, 13);
}
const DOW_KEY = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

function generateSeedTasks(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const weekNum = getWeekNum(d);
  if (!weekNum) return [];
  const dow = d.getDay();
  const dk  = DOW_KEY[dow];
  const tasks = [];
  let n = 0;
  const add = (cat, text) => tasks.push({ id:`s-${toKey(d)}-${n++}`, text, cat, done:false });

  // ── Daily (every day) ──
  add('health',   '🌅 Wake up 5:30 AM — cold splash, no phone for 10 min');
  add('love',     '🎸 Guitar practice 15 min (7:20–7:35 AM)');
  add('love',     '📓 Journal: 3 things proud of + 1 daily intention (7:35–7:45 AM)');
  add('health',   '🥚 High-protein breakfast (eggs + meat) — zero sugar');
  add('health',   '💧 Drink 3L water today');
  add('money',    '📊 Check daily sales count + update profit tracker');
  add('health',   '😴 In bed by 10:30 PM — phone on airplane mode across the room');

  // ── Day-of-week ──
  if (dow === 1) {
    add('health',   '💪 Push Day: Chest · Shoulders · Triceps (after school, 3–4 PM)');
    add('happiness','📖 A-Level Study: Math + Physics (6–8 PM — timed past papers)');
    add('money',    '💰 Business: prospect 5 local businesses + review weekly targets (4:15–6 PM)');
    add('love',     '❤️ Family time — no phone, active listening (8–8:30 PM)');
  }
  if (dow === 2) {
    add('health',   '💪 Pull Day: Back · Biceps (after Rubik Club, ~5:30 PM)');
    add('happiness','📖 A-Level Study: Chemistry + Math (7:30–9 PM)');
    add('money',    '💰 Business: Build Make.com automation + send DMs (after school)');
    add('love',     '❤️ Family time after clubs — active listening (9–9:30 PM)');
  }
  if (dow === 3) {
    add('health',   '💪 Legs + Core: Squats · RDLs · Planks (after school, 12:30–1:30 PM)');
    add('happiness','📖 A-Level Study: Physics + Weak Subjects (4:30–7 PM — longest block)');
    add('money',    '💰 Business deep build: workflows, pitch prep, portfolio (2–4 PM)');
    add('love',     '❤️ Family time (7–7:30 PM)');
  }
  if (dow === 4) {
    add('health',   '💪 Push Day (Upper Body Focus): Incline · OHP · Triceps (2–3 PM)');
    add('happiness','📖 A-Level Study: All Subjects Rotation (5–7 PM)');
    add('money',    '💰 Business: follow up clients + financials + stocks check (3:15–5 PM)');
    add('love',     '❤️ Family time (8–8:30 PM)');
  }
  if (dow === 5) {
    add('health',   '💪 Pull Day: Back · Biceps · Shrugs (after school, 2–3 PM)');
    add('happiness','📖 A-Level Study: Fix this week\'s biggest weak topic (5–7 PM)');
    add('money',    '💰 Business: week review — sales total, profit, leads. Plan next week. (3:15–5 PM)');
    add('love',     '❤️ Family time (8–8:30 PM)');
  }
  if (dow === 6) {
    add('health',   '💪 Legs + Active Recovery: 30-min walk + full body stretch (10 AM)');
    add('love',     '❤️ Family/Social time — connect with friends or family (3–5 PM)');
    add('happiness','✨ Do one thing today that brings you pure joy');
  }
  if (dow === 0) {
    add('happiness','📖 A-Level: light review — flashcards, concept maps, no heavy work (2–4 PM)');
    add('money',    '💰 Weekly review: sales numbers, profit, leads, stock portfolio check (11 AM)');
    add('love',     '📓 Weekly reflection journal: what did you learn about yourself this week?');
    add('money',    '📋 Plan next week: set targets for all 4 categories');
  }

  // ── Week-specific ──
  const ws = WEEK_SPECIFIC[weekNum]?.[dk] || [];
  ws.forEach(t => add(t.cat, t.text));
  return tasks;
}

function seedAllTasks() {
  const all = {};
  const d = new Date(PLAN_START);
  while (d <= PLAN_END) {
    const k = toKey(d);
    all[k] = generateSeedTasks(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return all;
}

/* ─────────────────────────────────────────────────────────────────
   PROGRESS RING
───────────────────────────────────────────────────────────────── */
function ProgressRing({ pct, size=64, stroke=5, color='#f0c040' }) {
  const r = (size - stroke * 2) / 2;
  const c = 2 * Math.PI * r;
  const off = c - (pct / 100) * c;
  return (
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={c} strokeDashoffset={off}
        style={{transition:'stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)', strokeLinecap:'round'}}/>
    </svg>
  );
}

/* ─────────────────────────────────────────────────────────────────
   MINI BAR CHART (Overview)
───────────────────────────────────────────────────────────────── */
function MiniBar({ label, done, total, color }) {
  const pct = total ? Math.round(done/total*100) : 0;
  return (
    <div style={{marginBottom:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
        <span style={{fontSize:13,fontWeight:600,color}}>{label}</span>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <span style={{fontFamily:'DM Mono',fontSize:11,color:'rgba(255,255,255,0.3)'}}>{done}/{total}</span>
          <span style={{fontFamily:'DM Mono',fontSize:12,color,fontWeight:500,minWidth:36,textAlign:'right'}}>{pct}%</span>
        </div>
      </div>
      <div style={{height:5,background:'rgba(255,255,255,0.06)',borderRadius:100,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${pct}%`,background:`linear-gradient(90deg,${color}88,${color})`,
          borderRadius:100,transition:'width .8s cubic-bezier(.4,0,.2,1)'}}/>
      </div>
    </div>
  );
}

        {/* ══════════════════════════════════════════════
            OVERVIEW TAB
        ══════════════════════════════════════════════ */}
        {tab==='overview'&&(
          <div className="fade-in">
            <h1 style={{fontFamily:'Cormorant Garamond,serif',fontSize:38,fontWeight:300,color:'#fff',marginBottom:4,letterSpacing:'-.5px'}}>
              Overview
            </h1>
            <p style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--muted)',marginBottom:28,letterSpacing:.5}}>
              Your 90-day transformation progress
            </p>

            {/* Stat Cards */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:24}}>
              {[
                {label:'Total Tasks',  val:allFlat.length,                                                     icon:'📋', color:'var(--text)'},
                {label:'Completed',    val:allFlat.filter(t=>t.done).length,                                    icon:'✅', color:'var(--health)'},
                {label:'Rate',         val:`${allFlat.length?Math.round(allFlat.filter(t=>t.done).length/allFlat.length*100):0}%`, icon:'📊', color:'var(--gold)'},
                {label:'Streak',       val:`${streak}d`,                                                        icon:'🔥', color:'#fb923c'},
              ].map((s,i)=>(
                <div key={i} style={{background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',
                  borderRadius:13,padding:'18px 14px',textAlign:'center'}}>
                  <div style={{fontSize:22,marginBottom:6}}>{s.icon}</div>
                  <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:28,fontWeight:500,color:s.color,lineHeight:1,marginBottom:3}}>{s.val}</div>
                  <div style={{fontFamily:'DM Mono,monospace',fontSize:9,color:'var(--muted)',letterSpacing:1,textTransform:'uppercase'}}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* Category Breakdown */}
            <div style={{background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',
              borderRadius:14,padding:'22px',marginBottom:16}}>
              <div style={{fontFamily:'DM Mono,monospace',fontSize:10,letterSpacing:2,textTransform:'uppercase',
                color:'var(--muted)',marginBottom:18,fontWeight:500}}>Category Progress</div>
              {CATEGORIES.map(c=>{
                const ts=allFlat.filter(t=>t.cat===c.id);
                return <MiniBar key={c.id} label={`${c.emoji} ${c.label}`} done={ts.filter(t=>t.done).length} total={ts.length} color={c.color}/>;
              })}
            </div>

            {/* 7-Day Chart */}
            <div style={{background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',
              borderRadius:14,padding:'22px',marginBottom:16}}>
              <div style={{fontFamily:'DM Mono,monospace',fontSize:10,letterSpacing:2,textTransform:'uppercase',
                color:'var(--muted)',marginBottom:18,fontWeight:500}}>Last 7 Days</div>
              <div style={{display:'flex',gap:10,alignItems:'flex-end',height:110}}>
                {last7.map((d,i)=>{
                  const isTod=d.key===toKey(today);
                  const pct=d.total?d.done/d.total:0;
                  const h=Math.max(d.total?pct*90:4,4);
                  return (
                    <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:5,cursor:'pointer'}}
                      onClick={()=>{setSelDate(new Date(d.date));setTab('today');}}>
                      <span style={{fontFamily:'DM Mono,monospace',fontSize:9,color:isTod?'var(--gold)':'var(--muted)'}}>{d.done}</span>
                      <div style={{width:'100%',height:90,display:'flex',alignItems:'flex-end',
                        borderRadius:6,overflow:'hidden',background:'rgba(255,255,255,0.04)'}}>
                        <div style={{width:'100%',height:`${h}px`,
                          background:isTod?'linear-gradient(180deg,#f0c040,#c89820)':
                            pct===1?'linear-gradient(180deg,#4ade80,#22c55e)':
                            'linear-gradient(180deg,rgba(240,192,64,.45),rgba(240,192,64,.2))',
                          borderRadius:'4px 4px 0 0',transition:'height .7s ease'}}/>
                      </div>
                      <span style={{fontFamily:'DM Mono,monospace',fontSize:9,
                        color:isTod?'var(--gold)':'var(--muted)',letterSpacing:.5}}>{DAYS[d.date.getDay()]}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Category daily task count today */}
            <div style={{background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',
              borderRadius:14,padding:'22px'}}>
              <div style={{fontFamily:'DM Mono,monospace',fontSize:10,letterSpacing:2,textTransform:'uppercase',
                color:'var(--muted)',marginBottom:18,fontWeight:500}}>Today's Breakdown</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                {CATEGORIES.map(c=>{
                  const todayKey=toKey(today);
                  const todTs=(tasks[todayKey]||[]).filter(t=>t.cat===c.id);
                  const pct=todTs.length?Math.round(todTs.filter(t=>t.done).length/todTs.length*100):0;
                  return (
                    <div key={c.id} style={{background:c.bg,border:`1px solid ${c.border}`,borderRadius:10,padding:'14px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                        <span style={{fontFamily:'Syne,sans-serif',fontSize:12,fontWeight:700,color:c.color}}>{c.emoji} {c.label}</span>
                        <span style={{fontFamily:'DM Mono,monospace',fontSize:11,color:c.color,fontWeight:500}}>{pct}%</span>
                      </div>
                      <div style={{fontFamily:'DM Mono,monospace',fontSize:10,color:'rgba(255,255,255,0.35)'}}>
                        {todTs.filter(t=>t.done).length}/{todTs.length} tasks done
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ══════════════════════════════════════════════
            PLAN TAB
        ══════════════════════════════════════════════ */}
        {tab==='plan'&&(
          <div className="fade-in">
            <h1 style={{fontFamily:'Cormorant Garamond,serif',fontSize:38,fontWeight:300,color:'#fff',marginBottom:4}}>
              3-Month Plan
            </h1>
            <p style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'var(--muted)',marginBottom:28,letterSpacing:.5}}>
              March 9 → June 8, 2026 · Click a week to jump to it
            </p>

            {[
              {phase:'Month 1 — Foundation', range:'Mar 9 → Apr 5', color:'var(--health)',
               weeks:[
                {n:1,label:'Launch',       focus:'Begin every habit on Day 1. No easing in.',          range:'Mar 9–15'},
                {n:2,label:'Consistency',  focus:'Show up even when you don\'t want to.',               range:'Mar 16–22'},
                {n:3,label:'Depth',        focus:'Sugar-free week. Go harder in every area.',           range:'Mar 23–29'},
                {n:4,label:'Review',       focus:'Measure everything. Celebrate Month 1 completion.',   range:'Mar 30–Apr 5'},
               ]},
              {phase:'Month 2 — Momentum', range:'Apr 6 → May 3', color:'var(--happy)',
               weeks:[
                {n:5,label:'Elevation',    focus:'Level up every system. First AI client.',             range:'Apr 6–12'},
                {n:6,label:'Skill Mastery',focus:'Deload. Master guitar, A-Level exam technique.',      range:'Apr 13–19'},
                {n:7,label:'Pressure',     focus:'Perform under stress like an athlete.',               range:'Apr 20–26'},
                {n:8,label:'Momentum Check',focus:'Two months done. Measure. Prepare for final push.',  range:'Apr 27–May 3'},
               ]},
              {phase:'Month 3 — Acceleration', range:'May 4 → Jun 8', color:'var(--money)',
               weeks:[
                {n:9, label:'Peak Week',    focus:'Your best 7 days. No more warming up. Drop sets.',   range:'May 4–10'},
                {n:10,label:'Exam Week',    focus:'Perform when it counts. Trust your preparation.',    range:'May 11–17'},
                {n:11,label:'Harvest',      focus:'Collect everything you\'ve planted. 400 sales push.',range:'May 18–24'},
                {n:12,label:'Legacy',       focus:'What did 3 months build? Integrate everything.',     range:'May 25–31'},
                {n:13,label:'Completion',   focus:'You are unrecognizable from March 9. That was the goal.',range:'Jun 1–8'},
               ]},
            ].map(month=>(
              <div key={month.phase} style={{marginBottom:28}}>
                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
                  <div style={{width:3,height:28,background:month.color,borderRadius:100}}/>
                  <div>
                    <div style={{fontFamily:'Syne,sans-serif',fontSize:16,fontWeight:700,color:'#fff'}}>{month.phase}</div>
                    <div style={{fontFamily:'DM Mono,monospace',fontSize:10,color:'var(--muted)',letterSpacing:.5}}>{month.range}</div>
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:8,paddingLeft:15}}>
                  {month.weeks.map(week=>{
                    const weekStart=new Date(PLAN_START);
                    weekStart.setDate(PLAN_START.getDate()+(week.n-1)*7);
                    const wTasks=Object.entries(tasks).filter(([k])=>{
                      const d=new Date(k); return getWeekNum(d)===week.n;
                    }).flatMap(([,ts])=>ts);
                    const wDone=wTasks.filter(t=>t.done).length;
                    const wPct=wTasks.length?Math.round(wDone/wTasks.length*100):0;
                    const isCurrent=getWeekNum(today)===week.n;
                    return (
                      <div key={week.n}
                        onClick={()=>{setSelDate(new Date(weekStart));setTab('today');}}
                        style={{padding:'14px 16px',borderRadius:11,cursor:'pointer',transition:'all .2s',
                          border:`1px solid ${isCurrent?month.color:'rgba(255,255,255,0.07)'}`,
                          background:isCurrent?`${month.color}08`:'rgba(255,255,255,0.015)'}}>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
                          <div style={{display:'flex',alignItems:'center',gap:10,flex:1,minWidth:0}}>
                            <span style={{fontFamily:'DM Mono,monospace',fontSize:11,
                              color:isCurrent?month.color:'var(--muted)',fontWeight:500,flexShrink:0}}>W{week.n}</span>
                            <div style={{minWidth:0}}>
                              <div style={{fontFamily:'Syne,sans-serif',fontSize:13,fontWeight:600,
                                color:isCurrent?'#fff':'rgba(255,255,255,0.7)',marginBottom:1}}>
                                {week.label}
                                {isCurrent&&<span style={{fontFamily:'DM Mono,monospace',fontSize:9,
                                  color:month.color,background:`${month.color}18`,border:`1px solid ${month.color}44`,
                                  padding:'1px 7px',borderRadius:100,marginLeft:8,letterSpacing:1}}>current</span>}
                              </div>
                              <div style={{fontFamily:'DM Mono,monospace',fontSize:10,color:'var(--muted)',
                                letterSpacing:.3,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                                {week.range} · {week.focus}
                              </div>
                            </div>
                          </div>
                          <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
                            {wTasks.length>0&&(
                              <div style={{width:48,height:4,background:'rgba(255,255,255,0.06)',borderRadius:100,overflow:'hidden'}}>
                                <div style={{height:'100%',width:`${wPct}%`,background:month.color,borderRadius:100,transition:'width .6s ease'}}/>
                              </div>
                            )}
                            <span style={{fontFamily:'DM Mono,monospace',fontSize:10,
                              color:wPct===100?'var(--health)':isCurrent?month.color:'var(--muted)',minWidth:30,textAlign:'right'}}>
                              {wTasks.length>0?`${wPct}%`:'—'}
                            </span>
                            <span style={{color:'var(--muted)',fontSize:12}}>→</span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}

            {/* Goals Summary */}
            <div style={{borderTop:'1px solid var(--border)',paddingTop:24,marginTop:8}}>
              <div style={{fontFamily:'DM Mono,monospace',fontSize:10,letterSpacing:2,textTransform:'uppercase',
                color:'var(--muted)',marginBottom:16,fontWeight:500}}>End Goals — June 8, 2026</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                {[
                  {cat:'health',   goals:['10% body fat reduction','Visible upper body gains','Sleep 10:30 PM permanent','Sugar-free most days']},
                  {cat:'love',     goals:['3 songs on guitar','Active listening mastery','Deeper family connections','Daily journal habit']},
                  {cat:'happiness',goals:['A-Level exams passed','University accepted','Shanghai trip completed','Win List filled']},
                  {cat:'money',    goals:['10M MNT monthly profit','1,000+ total sales','3+ AI workflow clients','Stock portfolio active']},
                ].map(g=>{
                  const cat=CAT_MAP[g.cat];
                  return (
                    <div key={g.cat} style={{background:cat.bg,border:`1px solid ${cat.border}`,borderRadius:11,padding:'14px'}}>
                      <div style={{fontFamily:'Syne,sans-serif',fontSize:12,fontWeight:700,color:cat.color,marginBottom:9}}>
                        {cat.emoji} {cat.label}
                      </div>
                      {g.goals.map((goal,i)=>(
                        <div key={i} style={{fontFamily:'Syne,sans-serif',fontSize:11,color:'rgba(255,255,255,0.55)',
                          padding:'2.5px 0',borderBottom:i<g.goals.length-1?'1px solid rgba(255,255,255,0.05)':'none',
                          display:'flex',alignItems:'center',gap:7}}>
                          <span style={{color:cat.color,fontSize:9,flexShrink:0}}>▸</span>{goal}
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}
      </main>

      {/* Toast */}
      {toast&&(
        <div style={{position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%)',
          background:'rgba(14,14,26,0.96)',backdropFilter:'blur(20px)',
          border:'1px solid rgba(240,192,64,0.28)',borderRadius:100,padding:'9px 22px',
          fontFamily:'Syne,sans-serif',fontSize:12,color:'var(--gold)',fontWeight:700,letterSpacing:.5,
          boxShadow:'0 8px 28px rgba(0,0,0,.5)',zIndex:999,animation:'toastIn .3s ease'}}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
